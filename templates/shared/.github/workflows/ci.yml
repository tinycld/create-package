name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  APP_REPO: tinycld/tinycld
  APP_REF: main

jobs:
  checks:
    name: Lint, typecheck, unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          path: {{PKG_SLUG}}
      - uses: actions/checkout@v5
        with:
          repository: ${{ env.APP_REPO }}
          ref: ${{ env.APP_REF }}
          path: tinycld
      - uses: oven-sh/setup-bun@v2

      # The app shell bundles @tinycld/core at packages/@tinycld/core/. Its
      # postinstall (packages:generate) creates a ../core symlink in the
      # workspace parent so this package's tsconfig path "@tinycld/core/*":
      # ["../core/*"] and its server go.mod replace directive both resolve.
      - name: Install app shell deps
        working-directory: tinycld
        run: bun install

      - name: Link {{PKG_SLUG}} into tinycld app shell
        working-directory: tinycld
        run: bun run packages:link ../{{PKG_SLUG}}

      - name: Expose tinycld's node_modules to {{PKG_SLUG}}
        run: ln -s ../tinycld/node_modules {{PKG_SLUG}}/node_modules

      - name: Lint {{PKG_SLUG}}
        working-directory: {{PKG_SLUG}}
        run: bun run lint

      # Typecheck runs from inside tinycld so module resolution sees the
      # full app-shell tree (uniwind augments, expo types, etc) — running
      # tsc standalone in the package directory misses those.
      - name: Typecheck (full app shell, package included via link)
        working-directory: tinycld
        env:
          NODE_OPTIONS: --preserve-symlinks
        run: bun run typecheck

      - name: Run unit tests
        working-directory: {{PKG_SLUG}}
        run: bunx vitest run
